<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SaveSync</title>
<style>
:root {
	--bg: #0E1116;
	--bg2: #1B2230;
	--panel: #161B25;
	--panel-hi: #1F2735;
	--border: #2C3645;
	--text: #ECEFF4;
	--dim: #8B96A8;
	--accent: #4FC3F7;
	--ok: #6FCF97;
	--warn: #F2C94C;
	--err: #EB5757;
	--shadow: 0 8px 24px rgba(0,0,0,.4);
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
	margin: 0;
	font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
	background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
	color: var(--text);
	-webkit-font-smoothing: antialiased;
}
header {
	display: flex; align-items: center; justify-content: space-between;
	padding: 24px 32px; border-bottom: 1px solid var(--border);
}
.brand { display: flex; align-items: baseline; gap: 12px; }
.brand .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--accent); }
.brand .sub  { font-size: 13px; color: var(--dim); }
.status { display: flex; gap: 16px; align-items: center; font-size: 13px; color: var(--dim); }
.status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); display: inline-block; margin-right: 6px; }

main { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 24px; padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
@media (max-width: 900px) { main { grid-template-columns: 1fr; } }

.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); }
.panel h2 { margin: 0 0 16px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); font-weight: 600; }

.toolbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.toolbar input[type="search"] {
	flex: 1; min-width: 200px;
	background: var(--panel-hi); border: 1px solid var(--border); color: var(--text);
	padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none;
}
.toolbar input[type="search"]:focus { border-color: var(--accent); }
.btn {
	background: var(--panel-hi); border: 1px solid var(--border); color: var(--text);
	padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500;
	cursor: pointer; transition: all .15s ease;
}
.btn:hover { background: var(--border); }
.btn.primary { background: var(--accent); color: #001624; border-color: var(--accent); }
.btn.primary:hover { filter: brightness(1.1); }
.btn:disabled { opacity: .4; cursor: not-allowed; }

.save-grid { display: flex; flex-direction: column; gap: 14px; }
.save-card {
	background: var(--panel-hi); border: 1px solid var(--border); border-radius: 10px;
	padding: 14px; display: flex; gap: 12px; cursor: pointer; transition: border-color .15s;
}
.save-card:hover { border-color: var(--accent); }
.save-card.selected { border-color: var(--accent); background: #1A2536; }
.save-icon { width: 64px; height: 64px; flex-shrink: 0; border-radius: 6px; background: var(--bg); object-fit: cover; }
.save-meta { min-width: 0; flex: 1; }
.save-title { font-weight: 600; font-size: 14px; margin: 0 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.save-sub { font-size: 12px; color: var(--dim); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.save-tags { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: var(--bg); color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }
.tag.ps3 { background: rgba(111,207,151,.15); color: var(--ok); }
.tag.rpcs3 { background: rgba(242,201,76,.15); color: var(--warn); }
.tag.usb { background: rgba(79,195,247,.15); color: var(--accent); }

/* Game grouping: a card per title_id with its slots tucked inside. */
.game-card {
	background: var(--panel-hi); border: 1px solid var(--border); border-radius: 12px;
	overflow: hidden;
}
.game-head {
	display: flex; gap: 14px; align-items: center;
	padding: 14px; cursor: pointer; user-select: none;
	transition: background .15s ease;
}
.game-head:hover { background: var(--border); }
.game-icon { width: 48px; height: 48px; flex-shrink: 0; border-radius: 6px; background: var(--bg); object-fit: cover; }
.game-meta { flex: 1; min-width: 0; }
.game-title { font-weight: 600; font-size: 15px; margin: 0 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.game-sub { font-size: 12px; color: var(--dim); margin: 0; }
.game-chev { color: var(--dim); font-size: 14px; transition: transform .15s ease; }
.game-card.open .game-chev { transform: rotate(90deg); }
.game-slots { display: none; padding: 0 14px 14px; flex-direction: column; gap: 8px; border-top: 1px solid var(--border); }
.game-card.open .game-slots { display: flex; }
.slot-card {
	background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
	padding: 10px 12px; display: flex; gap: 10px; align-items: center;
	cursor: pointer; transition: border-color .15s;
}
.slot-card:hover { border-color: var(--accent); }

.import-form { display: flex; flex-direction: column; gap: 12px; font-size: 13px; }
.import-form label { display: flex; flex-direction: column; gap: 4px; color: var(--dim); }
.import-form select, .import-form input[type="text"] {
	background: var(--panel-hi); border: 1px solid var(--border); color: var(--text);
	padding: 8px 10px; border-radius: 6px; font-size: 13px; outline: none;
}
.import-form select:focus, .import-form input[type="text"]:focus { border-color: var(--accent); }
.import-form .checks { display: flex; flex-direction: column; gap: 8px; }
.import-form .checks label { flex-direction: row; align-items: center; gap: 8px; color: var(--text); }
.import-form .hint { font-size: 12px; color: var(--dim); margin: 0; }

.dropzone {
	border: 2px dashed var(--border); border-radius: 10px;
	padding: 28px; text-align: center; color: var(--dim); font-size: 13px;
	transition: all .15s ease; cursor: pointer;
}
.dropzone.dragging { border-color: var(--accent); background: rgba(79,195,247,.05); color: var(--text); }
.dropzone strong { color: var(--text); display: block; margin-bottom: 4px; }

.jobs { display: flex; flex-direction: column; gap: 10px; }
.job { background: var(--panel-hi); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.job-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.job-name { font-size: 13px; font-weight: 600; }
.job-phase { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }
.job-phase.done { color: var(--ok); }
.job-phase.failed { color: var(--err); }
.bar { height: 6px; background: var(--bg); border-radius: 99px; overflow: hidden; }
.bar > span { display: block; height: 100%; background: var(--accent); transition: width .3s ease; }
.job-meta { font-size: 11px; color: var(--dim); margin-top: 4px; }

.empty { color: var(--dim); text-align: center; padding: 40px 20px; font-size: 14px; }

.detail-overlay {
	position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none;
	align-items: center; justify-content: center; z-index: 50; padding: 24px;
}
.detail-overlay.open { display: flex; }
.detail {
	background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
	max-width: 500px; width: 100%; padding: 24px; box-shadow: var(--shadow);
}
.detail h3 { margin: 0 0 4px; }
.detail dl { display: grid; grid-template-columns: 110px 1fr; gap: 8px 16px; margin: 16px 0; font-size: 13px; }
.detail dt { color: var(--dim); }
.detail .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap; }
</style>
</head>
<body>
<header>
	<div class="brand">
		<span class="logo">SaveSync</span>
		<span class="sub">RPCS3 ↔ PS3 save converter</span>
	</div>
	<div class="status" id="status">
		<span><span class="dot" id="status-dot"></span><span id="status-text">connecting…</span></span>
		<span id="status-version"></span>
	</div>
</header>
<main>
	<section class="panel">
		<h2>Games on PS3</h2>
		<div class="toolbar">
			<input type="search" id="search" placeholder="Search by title or game ID…">
			<button class="btn" id="refresh">Refresh</button>
		</div>
		<div id="save-grid" class="save-grid"></div>
		<div id="empty" class="empty" style="display:none">No saves found.</div>
	</section>
	<aside style="display: flex; flex-direction: column; gap: 16px;">
		<section class="panel">
			<h2>Import RPCS3 save</h2>
			<div class="dropzone" id="dropzone">
				<strong>Drop a .zip here</strong>
				or click to choose a file
				<input type="file" id="file-input" accept=".zip" hidden>
			</div>
		</section>
		<section class="panel">
			<h2>Active jobs</h2>
			<div class="jobs" id="jobs"></div>
			<div id="jobs-empty" class="empty" style="display:none">No active jobs.</div>
		</section>
	</aside>
</main>
<div class="detail-overlay" id="detail-overlay">
	<div class="detail" id="detail"></div>
</div>
<script src="/app.js"></script>
</body>
</html>
